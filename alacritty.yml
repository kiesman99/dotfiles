schemes:
 ayu_mirage: &ayu_mirage
  # Colors (Ayu Mirage)
  # Default colors
  primary:
    # text color
    background: '0x212733'
    foreground: '0xBBE67E'
  
  # Cursor colors
  cursor:
   text: '0xFFFFFF'
   cursor: '0xFFCC66'

  # Normal colors
  normal:
    black: '0x191E2A'
    red: '0xF28779'
    green: '0xA6CC70'
    yellow: '0xfad07b'
    blue: '0x6dcbfa'
    magenta: '0xcfbafa'
    cyan: '0x90e1c6'
    white: '0xc7c7c7'

  # Bright colors
  bright:
    black: '0x686868'
    red: '0xf28779'
    green: '0xbae67e'
    yellow: '0xffd580'
    blue: '0x73d0ff'
    magenta: '0xd4bfff'
    cyan: '0x95e6cb'
    white: '0xFFFFFF'

colors: *ayu_mirage
# background_opacity: 0.00

font:
  # The normal (roman) font face to use.
  normal:
    family: FuraCode Nerd Font Mono
    # Style can be specified to pick a specific face.
    style: Regular

  # The bold font face
  bold:
    family: FuraCode Nerd Font Mono
    # Style can be specified to pick a specific face.
    style: Bold

  # The italic font face
  italic:
    family: FuraCode Nerd Font Mono
    # Style can be specified to pick a specific face.
    style: Italic

  # Point size of the font
  size: 11

visual_bell:
  animation: EaseOutExpo
  duration: 0

padding:
  x: 20
  y: 20

window:
  padding:
    x: 20
    y: 20
